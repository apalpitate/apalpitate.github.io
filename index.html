<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>测试</title>
    </head>
    <body>
        <h1>青春不常在，抓紧谈恋爱</h1>
        <hr>
        <form action="">
            <p><strong>昵称:</strong></p><input type="text" placeholder="请输入昵称">
            <br><br>
            <p><strong>性别:</strong></p>
            <label ><input type="radio" name="sex" checked>男</label>
            <label ><input type="radio" name="sex">女</label>
            <label ><input type="radio" name="sex">武装直升机</label>
            <label ><input type="radio" name="sex">沃尔玛塑料袋</label>
            <br><br>
            <p><strong>所在城市:</strong></p>
            <select>
                <option>北京</option>
                <option>上海</option>
                <option>河南</option>
            </select>
            <br><br>
            <p><strong>婚姻状况:</strong></p>
            <label><input type="radio" name="婚姻状况">未婚</label>
            <label><input type="radio" name="婚姻状况">已婚</label>
            <label><input type="radio" name="婚姻状况">保密</label>
            <br><br>
           <p><strong>喜欢类型:</strong></p>
            <label><input type="checkbox" >可爱</label>
            <label><input type="checkbox" >性感</label>
            <label><input type="checkbox" >御姐</label>
            <label><input type="checkbox" >萝莉</label>
            <label><input type="checkbox" >小鲜肉</label>
            <label><input type="checkbox" >大叔</label>
            <br><br>
            <p><strong>个人介绍:</strong></p><br>
            <textarea></textarea>
            <br><br>
            <p><strong>我承诺：</strong></p>
            <ul>
                <li>年满18岁，单身</li>
                <li>抱着严肃的态度</li>
                <li>真诚寻找另一半</li>
            </ul>
            <br><br>
            <label><input type="checkbox"><strong>我同意所有条款</strong></label>
            <br><br>
            <button type="submit">免费注册</button>
            <button type="reset">重置</button>
        </form>
    </body>
</html>
